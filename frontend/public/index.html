<div id="root"></div>

<script type="text/babel">
/* ================= 全局错误处理 ================= */
window.addEventListener('error', function(e) {
  console.error('全局JavaScript错误:', e.error);
  document.body.innerHTML = `
    <div style="padding: 20px; background: #ff4444; color: white; font-family: Arial;">
      <h2>JavaScript错误</h2>
      <p>错误: ${e.error?.message || '未知错误'}</p>
      <p>文件: ${e.filename}</p>
      <p>行号: ${e.lineno}</p>
      <button onclick="window.location.reload()" style="padding: 10px 20px; background: white; color: black; border: none; cursor: pointer;">重新加载</button>
    </div>
  `;
});

window.addEventListener('unhandledrejection', function(e) {
  console.error('未处理的Promise拒绝:', e.reason);
});

const { useState, useEffect, useCallback, useMemo } = React;
// 统一的 axios 实例（支持返回 500 时也拿到响应体）
const api = axios.create({
  baseURL: '', // 同域就留空
  timeout: 30000,
  headers: { 'Accept': 'application/json, text/plain, */*' },
  // 让 4xx/5xx 也走到 then，前端自己判断
  validateStatus: () => true
});

api.interceptors.response.use(
  (res) => {
    // 统一打印，便于定位
    if (res.status >= 400) {
      console.error('API Error', {
        url: res.config?.url,
        method: res.config?.method,
        status: res.status,
        data: res.data
      });
    }
    return res;
  },
  (err) => {
    // 真正的网络错误（断网/CORS）
    console.error('Network Error', err);
    return Promise.reject(err);
  }
);

// 小工具：从各种格式里抠出“可读错误”
function extractErrorMessage(resOrErr) {
  // axios 返回（validateStatus=true）时是 res；否则是 err
  const res = resOrErr?.response || resOrErr;

  if (!res) return '未知错误（无响应）';

  // 服务器返回的各种常见格式
  const d = res.data;
  if (typeof d === 'string') {
    // 可能是 HTML/traceback/plain text，截断展示
    return d.slice(0, 2000);
  }
  if (typeof d === 'object' && d !== null) {
    return (
      d.error ||
      d.message ||
      d.detail ||
      JSON.stringify(d).slice(0, 2000)
    );
  }
  return `HTTP ${res.status} ${res.statusText || ''}`.trim();
}


/* ========== ★ 修复：统一 Axios 错误格式化 ========== */
function formatAxiosError(err) {
  const status = err?.response?.status;
  const data = err?.response?.data;
  const serverMsg = (data && (data.error || data.message)) || null;
  const msg = serverMsg || err?.message || '未知错误';
  const tb  = data?.traceback || null;
  // 方便调试
  console.error('API ERROR:', { status, msg, data });
  return { status, msg, traceback: tb, raw: err };
}

/* ========== ★ 修复：统一 NaN/Inf 清理 ========== */
function sanitize(value) {
  if (value === null || value === undefined) return value;
  if (typeof value === 'number' && (!Number.isFinite(value) || Number.isNaN(value))) return null;
  if (Array.isArray(value)) return value.map(sanitize);
  if (typeof value === 'object') {
    const out = {};
    for (const [k, v] of Object.entries(value)) out[k] = sanitize(v);
    return out;
  }
  return value;
}

/* ========== 错误边界 ========== */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, errorInfo) { console.error('React错误:', error, errorInfo); }
  render() {
    if (this.state.hasError) {
      return (
        <div className="container">
          <div className="alert alert-error">
            <h2>应用出现错误</h2>
            <p>错误信息: {this.state.error?.message}</p>
            <button onClick={() => window.location.reload()}>重新加载页面</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

    write_db: false,
    read_db: false
  });

  const [currentTask, setCurrentTask] = useState(null);
  const [tasks, setTasks] = useState([]);
  const [agents, setAgents] = useState([]);
  const [attackTools, setAttackTools] = useState([]);
  const [results, setResults] = useState(null);
  const [resultViewMode, setResultViewMode] = useState('origin'); // origin | attack
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [success, setSuccess] = useState(null);
  const [debugInfo, setDebugInfo] = useState(null);
  const [generatedCommand, setGeneratedCommand] = useState(null);
  const [socket, setSocket] = useState(null);
  const [logs, setLogs] = useState([]);
  const [isConnected, setIsConnected] = useState(false);
  const [showProgressModal, setShowProgressModal] = useState(false);
  const [currentProgressTaskId, setCurrentProgressTaskId] = useState(null);
  const currentProgressTaskIdRef = React.useRef(null);
  const [currentProgressData, setCurrentProgressData] = useState(null);
  const [modalMode, setModalMode] = useState('progress');
  const [logFilter, setLogFilter] = useState('all');
  const [historicalLogs, setHistoricalLogs] = useState([]);

  const viewSummary = useMemo(() => {
    if (!results || !results.summary) return null;
    const s = results.summary;
    const total = s.total_tests || 0;
    if (resultViewMode === 'attack') {
      const success = s.successful_attacks ?? 0;
      const failed = s.failed_attacks ?? Math.max(0, total - success);
      const rate = total ? Math.round((success / total) * 100) : 0;
      return { total, success, failed, rate };
    }
    // origin (默认)
    const success = s.successful_original ?? s.successful_attacks ?? 0;
    const failed = s.failed_original ?? Math.max(0, total - success);
    const rate = total ? Math.round((success / total) * 100) : 0;
    return { total, success, failed, rate };
  }, [results, resultViewMode]);

  // 同步 ref 和 state
  useEffect(() => {
    currentProgressTaskIdRef.current = currentProgressTaskId;
  }, [currentProgressTaskId]);

  /* ========== Socket.IO 初始化 ========== */
  useEffect(() => {
    const newSocket = io();
    setSocket(newSocket);

    newSocket.on('connect', () => { console.log('Socket.IO连接已建立'); setIsConnected(true); });
    newSocket.on('disconnect', () => { console.log('Socket.IO连接已断开'); setIsConnected(false); });

    newSocket.on('joined_task', (data) => {
      console.log('[前端] 已加入任务房间:', data);
    });

    newSocket.on('log_message', (data) => {
      console.log('[前端] 收到日志消息:', data);
      // 只处理当前正在查看的任务的日志（使用 ref 获取最新值）
      const currentTaskId = currentProgressTaskIdRef.current;
      if (data.task_id === currentTaskId) {
        setLogs(prev => [...prev, {
          id: Date.now() + Math.random(),
          message: data.message,
          timestamp: data.timestamp,
          task_id: data.task_id
        }]);
      } else {
        console.log('[前端] 忽略非当前任务的日志，task_id:', data.task_id, '当前任务:', currentTaskId);
      }
    });

    newSocket.on('task_status', (data) => {
      // 自动刷新任务列表
      loadTasks().catch(() => {});
      // 已完成后尝试取结果（使用 ref 获取最新值）
      const currentTaskId = currentProgressTaskIdRef.current;
      if (data.status === 'completed' && data.task_id === currentTaskId) {
        setTimeout(() => { loadTaskResult(data.task_id); setShowProgressModal(false); setSuccess('🎉 检测完成！结果已自动加载'); }, 1500);
      }
      if (data.status === 'failed' && data.task_id === currentTaskId) setError(`❌ 任务失败: ${data.current_step}`);
    });

    return () => { newSocket.close(); };
  }, []);

  /* 自动滚动日志底部 - 实时滚动 */
  useEffect(() => {
    if (logs.length > 0 && showProgressModal && modalMode === 'progress') {
      // 使用 requestAnimationFrame 确保在浏览器重绘前执行，实现实时滚动
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const el = document.querySelector('.log-content');
          if (el) {
            el.scrollTop = el.scrollHeight;
          }
        });
      });
    }
  }, [logs, showProgressModal, modalMode]);

  /* 初始加载 */
  useEffect(() => { loadAgents(); loadAttackTools(); loadTasks(); }, []);

  /* 运行中轮询状态（包括 queued 状态） */
  useEffect(() => {
    if (currentTask && currentTask.id && (currentTask.status === 'running' || currentTask.status === 'queued')) {
      const t = setInterval(() => { checkTaskStatus(currentTask.id); }, 2000);
      return () => clearInterval(t);
    }
  }, [currentTask]);

  /* 定期刷新任务历史，确保任务状态栏同步更新 */
  useEffect(() => {
    if (currentTask && currentTask.id) {
      // 每5秒刷新一次任务历史，确保状态栏及时更新
      const t = setInterval(() => { loadTasks(); }, 5000);
      return () => clearInterval(t);
    }
  }, [currentTask]);

  const joinTaskRoom = (taskId) => { if (socket) { socket.emit('join_task', { task_id: taskId }); setLogs([]); } };
  const leaveTaskRoom = (taskId) => { if (socket) socket.emit('leave_task', { task_id: taskId }); };
  const clearLogs = () => setLogs([]);

  /* 载入下拉数据 */
  const loadAgents = async () => {
    try { const r = await api.get('/api/agents'); setAgents(r.data); }
    catch (err) { const { msg } = formatAxiosError(err); setError(`加载智能体失败：${msg}`); }
  };
  const loadAttackTools = async () => {
    try { const r = await api.get('/api/attack-tools'); setAttackTools(r.data); }
    catch (err) { const { msg } = formatAxiosError(err); console.warn(`加载攻击工具失败：${msg}`); }
  };
  const loadTasks = async () => {
    try {
      const r = await api.get('/api/tasks', { headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }});
      const data = Array.isArray(r.data) ? r.data : [];
      setTasks(data);
      
      // ★ 如果当前任务存在，检查任务历史中是否有更新的状态，并同步所有字段
      if (currentTask && currentTask.id) {
        const taskInHistory = data.find(t => t.id === currentTask.id);
        if (taskInHistory) {
          // 检查是否有任何字段更新（状态、进度、时间等）
          const hasChanges = 
            taskInHistory.status !== currentTask.status ||
            taskInHistory.progress !== currentTask.progress ||
            taskInHistory.start_time !== currentTask.start_time ||
            taskInHistory.end_time !== currentTask.end_time ||
            taskInHistory.current_step !== currentTask.current_step;
          
          if (hasChanges) {
            // 同步更新 currentTask 的所有字段
            setCurrentTask(prev => {
              const progressValue = taskInHistory.progress !== undefined && taskInHistory.progress !== null 
                ? Number(taskInHistory.progress) || 0 
                : prev.progress !== undefined && prev.progress !== null 
                  ? Number(prev.progress) || 0 
                  : 0;
              return {
                ...prev,
                status: taskInHistory.status || prev.status,
                progress: progressValue,
                current_step: taskInHistory.current_step || prev.current_step,
                start_time: taskInHistory.start_time || prev.start_time,
                end_time: taskInHistory.end_time || prev.end_time
              };
            });
          }
        }
      }
      
      return data;
    } catch (err) {
      const { msg } = formatAxiosError(err);
      setTasks([]); setError(`加载任务失败：${msg}`);
      return [];
    }
  };

  const checkTaskStatus = async (taskId) => {
    if (!taskId) return;
    try {
      // 使用 /api/detection/progress/ 端点，它会返回最新的进度信息
      const r = await api.get(`/api/detection/progress/${taskId}`, { headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }});
      const d = r.data;
      if (!d || !d.task_id) {
        console.error('检查任务状态失败：返回数据中缺少 task_id');
        return;
      }
      
      // 确保进度值正确转换为数字
      let progressValue = 0;
      if (d.progress !== undefined && d.progress !== null) {
        const numProgress = Number(d.progress);
        if (!isNaN(numProgress)) {
          progressValue = Math.max(0, Math.min(100, numProgress));
        }
      }
      
      const task = {
        id: d.task_id, 
        status: d.status, 
        progress: progressValue,
        current_step: d.current_step || '',
        created_time: d.created_time, 
        start_time: d.start_time, 
        end_time: d.end_time, 
        config: d.config
      };
      
      // 调试日志（仅在开发时输出）
      if (progressValue > 0 || d.status === 'running') {
        console.log(`[进度更新] 任务 ${taskId.substring(0, 8)}... 状态: ${task.status}, 进度: ${progressValue}%, 步骤: ${task.current_step}`);
      }
      
      setCurrentTask(task);
      if (task.status === 'completed') { setShowProgressModal(false); setModalMode('progress'); await loadTaskResult(taskId); }
      else if (task.status === 'failed') { setError(`任务失败: ${task.current_step}`); setShowProgressModal(false); }
    } catch (err) {
      const { msg } = formatAxiosError(err);
      console.error('检查任务状态失败：', msg);
    }
  };

  const loadTaskResult = async (taskId) => {
  try {
    console.log('正在从后端获取任务结果:', taskId);

    // 加随机数穿透缓存
    const resultRes = await api.get(`/api/detection/result/${encodeURIComponent(taskId)}?t=${Date.now()}`);
    const logRes = await api.get(`/api/detection/logs/${encodeURIComponent(taskId)}?t=${Date.now()}`);

    // 非 2xx 先提示，但仍尝试解析数据，方便你看到后端 traceback
    if (resultRes.status >= 400) {
      const msg = extractErrorMessage(resultRes);
      setError(`获取结果失败（HTTP ${resultRes.status}）: ${msg}`);
      // 继续尝试解析，方便你在前端也能看到返回体内容
    } else {
      setError(null);
    }

    // ---- 结果解析：兜住 string/JSON/NaN ----
    let resultData = resultRes.data;

    // 有些后端直接返回 JSON 字符串或带 NaN
    if (typeof resultData === 'string') {
      const cleaned = resultData.replace(/:\s*NaN\b/g, ': null');
      try {
        resultData = JSON.parse(cleaned);
      } catch {
        // 不是合法 JSON，就包一层展示给 UI
        resultData = { raw: cleaned };
      }
    }

    // 递归清理 NaN
    const cleanNaN = (v) => {
      if (v === null || v === undefined) return v;
      if (typeof v === 'number' && Number.isNaN(v)) return null;
      if (Array.isArray(v)) return v.map(cleanNaN);
      if (typeof v === 'object') {
        const o = {};
        for (const [k, val] of Object.entries(v)) o[k] = cleanNaN(val);
        return o;
      }
      return v;
    };
    resultData = cleanNaN(resultData);

    // 没有 summary 就自己算一个
    if (!resultData.summary && Array.isArray(resultData.data)) {
      const total = resultData.data.length;
      const succAttack = resultData.data.filter(x => x.attack_success === true).length;
      const succOrigin = resultData.data.filter(x => x.original_success === true).length;
      const failAttack = total - succAttack;
      const failOrigin = total - succOrigin;
      resultData.summary = {
        total_tests: total,
        successful_attacks: succAttack,
        failed_attacks: failAttack,
        success_rate: total > 0 ? Math.round((succAttack / total) * 100) : 0,
        successful_original: succOrigin,
        failed_original: failOrigin,
        success_rate_original: total > 0 ? Math.round((succOrigin / total) * 100) : 0
      };
    }

    // ---- 日志解析：兜住 string/空/对象 ----
    let logData = logRes?.data;
    if (logRes.status >= 400) {
      // 日志拿不到不阻塞结果页
      const msg = extractErrorMessage(logRes);
      console.warn(`日志获取失败（HTTP ${logRes.status}）: ${msg}`);
      logData = [];
    } else {
      if (typeof logData === 'object' && logData !== null && 'content' in logData) {
        logData = logData.content;
      }
      if (typeof logData === 'string') {
        logData = logData
          .split('\n')
          .filter(l => l.trim())
          .map((line, i) => {
            const ts = line.match(/^(\d{4}-\d{2}-\d{2}[\sT]\d{2}:\d{2}:\d{2})/);
            const level = /ERROR|WARNING|INFO|DEBUG/i.exec(line)?.[0]?.toLowerCase() || 'info';
            return {
              id: `log-${taskId}-${i}`,
              timestamp: ts ? new Date(ts[1].replace(' ', 'T')).toISOString() : new Date().toISOString(),
              level,
              message: line
            };
          });
      }
      if (!Array.isArray(logData)) logData = [];
    }

    setResults(resultData);
    setLogs(logData);
    setHistoricalLogs(logData);
    setCurrentProgressTaskId(taskId);
    setShowProgressModal(false);

    if (resultRes.status < 400) {
      setSuccess('🎉 检测完成！已从后端获取最新结果数据');
    }
  } catch (err) {
    // 这里以前的拼接写法会被 + 和 || 的优先级坑到，这里改成 ??/模板串
    const msg = extractErrorMessage(err);
    setError(`获取结果失败: ${msg}`);
    console.error('获取结果失败（catch）:', err);
  }
};

  const viewTaskProgress = async (taskId) => {
    setCurrentProgressTaskId(taskId); setModalMode('progress'); setShowProgressModal(true); setLogs([]);
    if (socket) {
      console.log('[前端] 发送 join_task 事件, taskId:', taskId);
      socket.emit('join_task', { task_id: taskId });
    } else {
      console.error('[前端] Socket 未连接，无法加入任务房间');
    }
    try {
      const r = await api.get(`/api/detection/progress/${taskId}`, { headers: { 'Cache-Control':'no-cache','Pragma':'no-cache' }});
      setCurrentProgressData(r.data);
    } catch (err) {
      const { msg, traceback } = formatAxiosError(err);
      setError(`获取任务进度失败：${msg}`); if (traceback) setDebugInfo(`后端 traceback：\n${traceback}`);
    }
  };

  const closeProgressModal = () => { setShowProgressModal(false); setCurrentProgressData(null); setLogs([]); setModalMode('progress'); };

  const viewTaskLogs = async (taskId) => {
    try {
      const response = await api.get(`/api/detection/logs/${taskId}`, { headers: { 'Cache-Control':'no-cache','Pragma':'no-cache' }});
      const contentStr = typeof response.data?.content === 'string' ? response.data.content : (typeof response.data === 'string' ? response.data : '');
      const logLines = contentStr ? contentStr.split('\n').filter(line => line.trim()) : [];
      const parsedLogs = logLines.map((line, idx) => {
        const ts = line.match(/^(\d{4}-\d{2}-\d{2}[\sT]\d{2}:\d{2}:\d{2})/);
        let timestamp = new Date().toISOString(), message = line.trim();
        if (ts) { try { timestamp = new Date(ts[1].replace(' ', 'T')).toISOString(); message = message.slice(ts[1].length).trim(); } catch {} }
        const lower = message.toLowerCase();
        const level = lower.includes('error') || lower.includes('exception') ? 'error'
                     : lower.includes('warning') || lower.includes('warn') ? 'warning'
                     : lower.includes('debug') ? 'debug' : 'info';
        return { id: idx, timestamp, message, level };
      });
      setLogs(parsedLogs); setHistoricalLogs(parsedLogs); setCurrentProgressTaskId(taskId);
      setModalMode('logs'); setShowProgressModal(true);
      setCurrentProgressData({ log_file: response.data.log_file, file_size: response.data.file_size, last_modified: response.data.last_modified });
    } catch (err) {
      const { msg, traceback } = formatAxiosError(err);
      setError(`获取日志失败：${msg}`); if (traceback) setDebugInfo(`后端 traceback：\n${traceback}`);
    }
  };

  const downloadFile = async (taskId, fileType) => {
    try {
      let fileName = '', apiEndpoint = '';
      if (fileType === 'result') { fileName = `detection_result_${taskId}.json`; apiEndpoint = `/api/detection/result/${taskId}`; }
      else if (fileType === 'log') { fileName = `detection_log_${taskId}.log`; apiEndpoint = `/api/detection/logs/${taskId}`; }
      else throw new Error('不支持的文件类型');

      const response = await api.get(apiEndpoint, { headers: { 'Cache-Control':'no-cache','Pragma':'no-cache' }});
      const content = fileType === 'result' ? JSON.stringify(response.data, null, 2) : (response.data?.content || response.data || '');
      const blob = new Blob([content], { type: fileType === 'result' ? 'application/json' : 'text/plain' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a');
      a.href = url; a.download = fileName; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      setSuccess(`文件下载已开始: ${fileName}`);
    } catch (err) {
      const { msg, traceback } = formatAxiosError(err);
      setError(`下载文件失败：${msg}`); if (traceback) setDebugInfo(`后端 traceback：\n${traceback}`);
    }
  };

  const startDetection = async () => { await generateCommandAndStart(); };

  const startCustomDetection = async (customCommand) => {
    setDebugInfo('正在启动自定义命令检测...'); setLoading(true); setError(null); setSuccess(null); setResults(null);
    try {
      const response = await api.post('/api/detection/start', { ...config, custom_command: customCommand });
      const taskData = response.data;
      if (!taskData || !taskData.task_id) {
        setError('启动自定义命令检测失败：服务器未返回任务ID');
        setDebugInfo('响应数据: ' + JSON.stringify(taskData));
        return;
      }
      const task = { id: taskData.task_id, status: taskData.status, message: taskData.message, created_time: new Date().toISOString(), progress: 0 };
      setCurrentTask(task); setSuccess('🚀 自定义命令检测任务已启动'); setDebugInfo('自定义命令任务启动成功: ' + task.id);
      joinTaskRoom(task.id); loadTasks();
    } catch (err) {
      const { msg, traceback, raw } = formatAxiosError(err);
      setError(`启动自定义命令检测失败：${msg}`);
      setDebugInfo('错误详情: ' + (raw?.response?.data ? JSON.stringify(raw.response.data) : msg) + (traceback ? `\n${traceback}` : ''));
    } finally { setLoading(false); }
  };

  const cancelDetection = async () => {
    if (!currentTask || !currentTask.id) return;
    try { await api.post(`/api/detection/cancel/${currentTask.id}`); setCurrentTask(null); setSuccess('⏹️ 任务已取消'); loadTasks(); }
    catch (err) { const { msg } = formatAxiosError(err); setError(`取消任务失败：${msg}`); }
  };

  const updateConfig = (field, value) => { setConfig(prev => ({ ...prev, [field]: value })); };
  const updateArrayConfig = (field, value) => { const values = value.split(',').map(v => v.trim()).filter(Boolean); updateConfig(field, values); };

  const generateCommandFrontend = () => {
    if (!config.agent) { setError('请先选择一个智能体'); return; }
    setError(null); setSuccess(null); setDebugInfo('正在生成命令行...');
    try {
      const now = new Date();
      const timestamp = now.getFullYear().toString() +
        (now.getMonth()+1).toString().padStart(2,'0') +
        now.getDate().toString().padStart(2,'0') + '_' +
        now.getHours().toString().padStart(2,'0') +
        now.getMinutes().toString().padStart(2,'0') +
        now.getSeconds().toString().padStart(2,'0');

      const attackTypes = config.attack_types.length>0 ? config.attack_types : ['context_ignoring'];
      const llmName = config.llms[0] || 'llama3:8b';
      const injectionMethod = config.injection_method || 'observation_prompt_injection';

      const commands = attackTypes.map(attackType => {
        const logDir = `logs/${injectionMethod}/ollama:${llmName}/no_memory/single`;
        const csvFile = `${logDir}/${attackType}-single-${timestamp}.csv`;
        const logFile = `${logDir}/${attackType}-single-${timestamp}.log`;
        return `cd /home/flowteam/zqy/agent-safe-probe-x && conda activate ASB && python main_attacker.py --llm_name ollama/${llmName} --attack_type ${attackType} --use_backend ollama --attacker_tools_path data/all_attack_tools.jsonl --tasks_path data/agent_task_pot.jsonl --task_num ${config.task_num} --single_agent ${config.agent} --workflow_mode manual --single --timestamp ${timestamp} --${injectionMethod} --res_file ${csvFile} > ${logFile} 2>&1`;
      });
      const customCommand = commands.join(' && ');
      setGeneratedCommand(customCommand);
      setSuccess('✅ 命令行已生成（包含 --single 和 --timestamp 参数）');
      setDebugInfo('命令生成成功，包含所有必需参数');
    } catch (err) {
      setError('生成命令失败: ' + (err?.message || '未知错误'));
      setDebugInfo('错误详情: ' + (err?.stack || err?.message || ''));
    }
  };

  const generateCommandAndStart = async () => {
    if (!config.agent) { setError('请先选择一个智能体'); return; }
    setLoading(true); setError(null); setSuccess(null); setDebugInfo('正在生成命令行并启动检测...');
    try {
      const requestData = {
        single_agent: config.agent,
        attack_types: config.attack_types.length>0 ? config.attack_types : ['context_ignoring'],
        llm_name: config.llms[0] || 'llama3:8b',
        use_backend: 'ollama',
        attacker_tools_path: 'data/all_attack_tools.jsonl',
        tasks_path: 'data/agent_task_pot.jsonl',
        task_num: config.task_num,
        workflow_mode: 'manual',
        injection_method: config.injection_method
      };
      const resp = await api.post('/api/generate-command', requestData);
      if (resp.data.error) { setError('生成命令失败: ' + resp.data.error); return; }
      const command = resp.data.command; setGeneratedCommand(command);

      const detectionResponse = await api.post('/api/detection/start', { ...config, custom_command: command });
      const taskData = detectionResponse.data;
      if (!taskData || !taskData.task_id) {
        setError('启动检测失败：服务器未返回任务ID');
        setDebugInfo('响应数据: ' + JSON.stringify(taskData));
        return;
      }
      const task = { id: taskData.task_id, status: taskData.status, message: taskData.message, created_time: new Date().toISOString(), progress: 0, command };
      setCurrentTask(task); setSuccess('✅ 检测任务已启动'); setDebugInfo('任务ID: ' + taskData.task_id);
      joinTaskRoom(task.id); loadTasks();
    } catch (err) {
      const { msg, traceback, raw } = formatAxiosError(err);
      setError(`启动检测失败：${msg}`);
      setDebugInfo('错误详情: ' + (raw?.response?.data ? JSON.stringify(raw.response.data) : msg) + (traceback ? `\n${traceback}` : ''));
    } finally { setLoading(false); }
  };

  /* ======= 渲染 ======= */
  return (
    <div className="container">
      <div className="header">
        <h1>
          <i className="fas fa-shield-virus icon" style={{marginRight:'15px', color:'#6366f1', filter:'drop-shadow(0 0 10px var(--glow-color))'}}></i>
          <span className="brand-acronym">ASP-X</span>
          <span style={{fontSize:'2rem', marginLeft:'10px'}}>Agent Safe Probe</span>
        </h1>
        <p>An Open-Source Framework for Automated Safety Evaluation of Intelligent Agents</p>
        <div className="subtitle">开源智能体安全评估框架</div>
      </div>

      {error && (
        <div className="alert alert-error">
          <i className="fas fa-exclamation-triangle"></i> {error}
          {/* ★ 修复：在错误框里提供 traceback 折叠详情 */}
          {debugInfo && debugInfo.includes('traceback') && (
            <details style={{ marginTop: '10px' }}>
              <summary>展开后端 traceback</summary>
              <pre style={{ whiteSpace:'pre-wrap' }}>{debugInfo}</pre>
            </details>
          )}
        </div>
      )}

      {success && (
        <div className="alert alert-success">
          <i className="fas fa-check-circle"></i> {success}
        </div>
      )}

      {debugInfo && !debugInfo.includes('traceback') && (
        <div className="alert alert-info">
          <i className="fas fa-info-circle"></i> 调试信息: <pre style={{ display:'inline', whiteSpace:'pre-wrap' }}>{debugInfo}</pre>
        </div>
      )}

      {generatedCommand && (
        <div className="card full-width">
          <h2><i className="fas fa-terminal icon"></i> 生成的命令行</h2>
          <div style={{ background:'#1a1a1a', color:'#00ff00', padding:'20px', borderRadius:'8px', fontFamily:'monospace', fontSize:'14px', lineHeight:'1.5', overflow:'auto', border:'1px solid #333' }}>
            <pre style={{ margin:0, whiteSpace:'pre-wrap' }}>{generatedCommand}</pre>
          </div>
          <div style={{ marginTop:'15px' }}>
            <button className="btn btn-success" onClick={() => { navigator.clipboard.writeText(generatedCommand); setSuccess('📋 命令行已复制到剪贴板'); }}>
              <i className="fas fa-copy"></i> 复制命令
            </button>
            <button className="btn" onClick={() => setGeneratedCommand(null)}>
              <i className="fas fa-times"></i> 关闭
            </button>
          </div>
        </div>
      )}

      {/* 实时日志模块（保持原样） */}
      {currentTask && currentTask.status === 'running' && (
        <div className="log-container">
          <div className="log-header">
            <div className="log-title">
              <i className="fas fa-terminal"></i> 实时日志监控
              <span style={{ marginLeft:'10px', fontSize:'12px', color: isConnected ? '#4facfe' : '#fa709a' }}>
                {isConnected ? '🟢 已连接' : '🔴 未连接'}
              </span>
            </div>
            <div className="log-controls">
              <button className="log-btn" onClick={clearLogs}><i className="fas fa-trash"></i> 清空日志</button>
              <button className="log-btn danger" onClick={() => { if (currentTask && currentTask.id) leaveTaskRoom(currentTask.id); }}><i className="fas fa-sign-out-alt"></i> 停止监控</button>
            </div>
          </div>
          <div className="log-content">
            {logs.length === 0 ? (
              <div style={{ color:'#a0a0a0', textAlign:'center', padding:'20px', fontStyle:'italic' }}>等待日志输出...</div>
            ) : (
              logs.map(log => (
                <div key={log.id} className={`log-line ${log.level || 'info'}`}>
                  <span className="log-timestamp">{new Date(log.timestamp).toLocaleTimeString()}</span>
                  <span className="log-level">[{(log.level || 'info').toUpperCase()}]</span>
                  <span className="log-message">{log.message}</span>
                </div>
              ))
            )}
            {logs.length > 0 && <div className="log-scroll-indicator">共 {logs.length} 条日志</div>}
          </div>
        </div>
      )}

      <div className="main-content">
        <div className="card">
          <h2><i className="fas fa-cog icon"></i> 检测配置</h2>
          {/* —— 配置表单（保持原样） —— */}
          <div className="form-group">
            <label><i className="fas fa-robot"></i> 选择智能体</label>
            <select className="form-control" value={config.agent || ''} onChange={(e)=>updateConfig('agent', e.target.value)}>
              <option value="">请选择智能体...</option>
              {agents.map(agent => (<option key={agent.name} value={agent.name}>{agent.name} - {agent.path}</option>))}
            </select>
            {agents.length===0 && <small className="text-muted">正在加载智能体列表...</small>}
          </div>
          <div className="form-group">
            <label><i className="fas fa-bug"></i> 注入方法</label>
            <select className="form-control" value={config.injection_method} onChange={(e)=>updateConfig('injection_method', e.target.value)}>
              <option value="observation_prompt_injection">observation_prompt_injection - 观察提示注入</option>
              <option value="direct_prompt_injection">direct_prompt_injection - 直接提示注入</option>
              <option value="memory_attack">memory_attack - 内存攻击</option>
              <option value="clean">clean - 干净模式</option>
              <option value="mixed_attack">mixed_attack - 混合攻击</option>
              <option value="pot_backdoor">pot_backdoor - POT后门攻击</option>
              <option value="pot_clean">pot_clean - POT干净模式</option>
            </select>
          </div>
          <div className="form-group">
            <label><i className="fas fa-tools"></i> 攻击工具类型</label>
            <input type="text" className="form-control" value={config.attack_tool.join(', ')} onChange={(e)=>updateArrayConfig('attack_tool', e.target.value)} placeholder="all, agg, non-agg, test" />
          </div>
          <div className="form-group">
            <label><i className="fas fa-brain"></i> LLM模型</label>
            <input type="text" className="form-control" value={config.llms.join(', ')} onChange={(e)=>updateArrayConfig('llms', e.target.value)} placeholder="llama3:8b, gpt-4o-mini" />
          </div>
          <div className="form-group">
            <label><i className="fas fa-crosshairs"></i> 攻击类型 (可多选)</label>
            <select className="form-control" multiple size="5" value={config.attack_types} onChange={(e)=>{ const selected = Array.from(e.target.selectedOptions, o=>o.value); setConfig({...config, attack_types: selected}); }}>
              <option value="context_ignoring">context_ignoring - 上下文忽略攻击</option>
              <option value="fake_completion">fake_completion - 虚假完成攻击</option>
              <option value="escape_characters">escape_characters - 转义字符攻击</option>
              <option value="naive">naive - 朴素攻击</option>
              <option value="combined_attack">combined_attack - 组合攻击</option>
            </select>
            <small className="form-text text-muted">按住 Ctrl/Cmd 键可多选，已选择: {config.attack_types.length} 个{config.attack_types.length>0 && <span> - {config.attack_types.join(', ')}</span>}</small>
            <div className="mt-2">
              <button type="button" className="btn btn-sm btn-outline-primary me-2" onClick={()=>{ const all = ['context_ignoring','fake_completion','escape_characters','naive','combined_attack']; setConfig({...config, attack_types: all}); }}>
                <i className="fas fa-check-square"></i> 全选
              </button>
              <button type="button" className="btn btn-sm btn-outline-secondary" onClick={()=>setConfig({...config, attack_types: []})}>
                <i className="fas fa-square"></i> 清空
              </button>
            </div>
          </div>
          <div className="form-group">
            <label><i className="fas fa-list-ol"></i> 任务数量</label>
            <input type="number" className="form-control" value={config.task_num} onChange={(e)=>updateConfig('task_num', parseInt(e.target.value))} min="1" />
          </div>
          <div className="form-group">
            <label><i className="fas fa-shield"></i> 防御类型 (可选)</label>
            <input type="text" className="form-control" value={config.defense_type || ''} onChange={(e)=>updateConfig('defense_type', e.target.value || null)} placeholder="ob_sandwich_defense, delimiters_defense" />
          </div>
          <div className="checkbox-group">
            <input type="checkbox" id="write_db" checked={config.write_db} onChange={(e)=>updateConfig('write_db', e.target.checked)} />
            <label htmlFor="write_db"><i className="fas fa-database"></i> 写入数据库</label>
          </div>
          <div className="checkbox-group">
            <input type="checkbox" id="read_db" checked={config.read_db} onChange={(e)=>updateConfig('read_db', e.target.checked)} />
            <label htmlFor="read_db"><i className="fas fa-database"></i> 读取数据库</label>
          </div>
          <button className="btn" onClick={startDetection} disabled={loading || (currentTask && currentTask.status==='running')}>
            {loading ? <span className="loading"></span> : <i className="fas fa-play"></i>} 开始检测
          </button>
          <button className="btn btn-success" onClick={generateCommandFrontend} disabled={loading}>
            <i className="fas fa-terminal"></i> 生成命令行
          </button>
          {generatedCommand && (
            <button className="btn btn-warning" onClick={()=>startCustomDetection(generatedCommand)} disabled={loading}>
              {loading ? <span className="loading"></span> : <i className="fas fa-rocket"></i>} 执行自定义命令
            </button>
          )}
          {currentTask && currentTask.status==='running' && (
            <button className="btn btn-danger" onClick={cancelDetection}><i className="fas fa-stop"></i> 取消检测</button>
          )}
        </div>

        <div className="card">
          <h2><i className="fas fa-chart-line icon"></i> 任务状态</h2>
          {currentTask ? (
            <div className="task-info">
              <div className="task-info-item">
                <span className="task-info-label">任务ID</span>
                <span className="task-info-value"><span className={`status-indicator status-${currentTask.status}`}></span>{currentTask.id ? currentTask.id.substring(0,8) + '...' : 'N/A'}</span>
              </div>
              <div className="task-info-item"><span className="task-info-label">状态</span><span className="task-info-value">{currentTask.status}</span></div>
              {(currentTask.status==='running' || currentTask.status==='queued') && (() => {
                // 处理进度值
                let progressValue = 0;
                if (currentTask.progress !== undefined && currentTask.progress !== null) {
                  const numProgress = Number(currentTask.progress);
                  if (!isNaN(numProgress)) {
                    progressValue = Math.max(0, Math.min(100, numProgress));
                  }
                }
                const progressPercent = Math.round(progressValue);
                const stepText = currentTask.current_step || (currentTask.status==='queued' ? '任务排队中...' : '检测进行中...');
                
                return (
                  <div className="progress-container">
                    <div className="progress-bar">
                      <div 
                        className="progress-fill" 
                        style={{ width: `${progressPercent}%` }}
                        title={`进度: ${progressPercent}%`}
                      ></div>
                    </div>
                    <div style={{ textAlign:'center', marginTop:'15px', color:'var(--text-secondary)' }}>
                      <span className="loading"></span> {stepText} ({progressPercent}%)
                    </div>
                  </div>
                );
              })()}
              <div className="task-info-item"><span className="task-info-label">创建时间</span><span className="task-info-value">{new Date(currentTask.created_time).toLocaleString()}</span></div>
              {currentTask.start_time && (<div className="task-info-item"><span className="task-info-label">开始时间</span><span className="task-info-value">{new Date(currentTask.start_time).toLocaleString()}</span></div>)}
              {currentTask.end_time && (<div className="task-info-item"><span className="task-info-label">结束时间</span><span className="task-info-value">{new Date(currentTask.end_time).toLocaleString()}</span></div>)}
            </div>
          ) : (
            <div className="alert alert-info"><i className="fas fa-info-circle"></i> 暂无运行中的任务</div>
          )}
        </div>
      </div>

      {/* 结果卡片 */}
      {results && viewSummary && (
        <div id="detection-results" className="card full-width">
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }}>
            <h2><i className="fas fa-chart-bar icon"></i> 检测结果</h2>
            <div style={{ display:'flex', gap:'10px' }}>
              <div className="btn-group" style={{ display:'flex', gap:'6px' }}>
                <button
                  className="btn btn-sm"
                  style={{ opacity: resultViewMode === 'origin' ? 1 : 0.6 }}
                  onClick={()=>setResultViewMode('origin')}
                >
                  攻击成功
                </button>
                <button
                  className="btn btn-sm"
                  style={{ opacity: resultViewMode === 'attack' ? 1 : 0.6 }}
                  onClick={()=>setResultViewMode('attack')}
                >
                  防护成功
                </button>
              </div>
              <button className="btn btn-primary btn-sm" onClick={()=>downloadFile(currentProgressTaskId, 'result')} disabled={!currentProgressTaskId}>
                <i className="fas fa-download"></i> 下载结果文件
              </button>
              <button className="btn btn-secondary btn-sm" onClick={()=>viewTaskLogs(currentProgressTaskId)}>
                <i className="fas fa-file-alt"></i> 查看日志
              </button>
            </div>
          </div>

          <div className="stats-grid">
            <div className="stat-card"><div className="stat-number">{viewSummary.total}</div><div className="stat-label">总测试数</div></div>
            <div className="stat-card"><div className="stat-number">{viewSummary.success}</div><div className="stat-label">{resultViewMode === 'attack' ? '成功攻击' : '原始成功'}</div></div>
            <div className="stat-card"><div className="stat-number">{viewSummary.failed}</div><div className="stat-label">{resultViewMode === 'attack' ? '失败攻击' : '原始失败'}</div></div>
            <div className="stat-card">
              <div className="stat-number">
                {viewSummary.rate}%
              </div>
              <div className="stat-label">{resultViewMode === 'attack' ? '攻击成功率' : '原始成功率'}</div>
            </div>
          </div>

          {results.data && results.data.length > 0 && (
            <table className="results-table">
              <thead>
                <tr>
                  <th><i className="fas fa-robot"></i> 智能体</th>
                  <th><i className="fas fa-tasks"></i> 任务</th>
                  <th><i className="fas fa-tools"></i> 攻击工具</th>
                  <th><i className="fas fa-check"></i> 防护成功</th>
                  <th><i className="fas fa-check-circle"></i> 攻击成功</th>
                  <th><i className="fas fa-comment"></i> 响应</th>
                </tr>
              </thead>
              <tbody>
                {results.data.map((row, idx) => (
                  <tr key={idx}>
                    <td>{row.agent_name || '-'}</td>
                    <td>{row.task || '-'}</td>
                    <td>{row.attack_tool || '-'}</td>
                    <td><span className={`status-indicator ${row.attack_success ? 'status-completed' : 'status-failed'}`}></span>{row.attack_success ? '是' : '否'}</td>
                    <td><span className={`status-indicator ${row.original_success ? 'status-completed' : 'status-failed'}`}></span>{row.original_success ? '是' : '否'}</td>
                    <td>{row.response ? String(row.response).substring(0, 100) + '...' : '-'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* 任务历史 */}
      <div className="card full-width">
        <h2><i className="fas fa-history icon"></i> 任务历史</h2>
        {tasks.length > 0 ? (
          <table className="results-table">
            <thead>
              <tr>
                <th><i className="fas fa-hashtag"></i> 任务ID</th>
                <th><i className="fas fa-info-circle"></i> 状态</th>
                <th><i className="fas fa-calendar-plus"></i> 创建时间</th>
                <th><i className="fas fa-play"></i> 开始时间</th>
                <th><i className="fas fa-stop"></i> 结束时间</th>
                <th><i className="fas fa-cog"></i> 操作</th>
              </tr>
            </thead>
            <tbody>
              {tasks.map(task => (
                <tr key={task.id}>
                  <td>{task.id?.substring(0, 8) || task.id}...</td>
                  <td><span className={`status-indicator status-${task.status}`}></span>{task.status}</td>
                  <td>{task.created_time ? new Date(task.created_time).toLocaleString() : '-'}</td>
                  <td>{task.start_time ? new Date(task.start_time).toLocaleString() : '-'}</td>
                  <td>{task.end_time ? new Date(task.end_time).toLocaleString() : '-'}</td>
                  <td>
                    {task.status === 'completed' && (
                      <button className="btn btn-success" onClick={()=>loadTaskResult(task.id)}><i className="fas fa-eye"></i> 查看结果</button>
                    )}
                    {(task.status === 'running' || task.status === 'queued') && (
                      <button className="btn btn-primary" onClick={()=>viewTaskProgress(task.id)}><i className="fas fa-chart-line"></i> 查看进度</button>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        ) : (<div className="alert alert-info"><i className="fas fa-info-circle"></i> 暂无任务历史</div>)}
      </div>

      {/* 进度/日志 模态框 */}
      {showProgressModal && (
        <div className="modal-overlay">
          <div className="modal-content progress-modal">
            <div className="modal-header">
              <h3><i className={`fas ${modalMode === 'progress' ? 'fa-chart-line' : 'fa-file-alt'}`}></i> {modalMode === 'progress' ? '任务实时进度' : '任务日志查看'}</h3>
              <button className="modal-close" onClick={closeProgressModal}><i className="fas fa-times"></i></button>
            </div>
            <div className="modal-body">
              <div className="progress-info">
                <p><strong>任务ID:</strong> {currentProgressTaskId}</p>
                {modalMode === 'progress' ? (
                  <>
                    <p><strong>连接状态:</strong>
                      <span className={`connection-status ${isConnected ? 'connected' : 'disconnected'}`}>
                        <i className={`fas fa-circle ${isConnected ? 'connected' : 'disconnected'}`}></i>{isConnected ? '已连接' : '未连接'}
                      </span>
                    </p>
                    {currentProgressData?.task_command && (
                      <div style={{ marginTop:'15px' }}>
                        <p><strong>执行命令:</strong></p>
                        <div style={{ background:'#1a1a1a', color:'#00ff00', padding:'15px', borderRadius:'8px', fontFamily:'monospace', fontSize:'12px', lineHeight:'1.4', overflow:'auto', border:'1px solid #333', maxHeight:'200px', marginTop:'10px' }}>
                          <pre style={{ margin:0, whiteSpace:'pre-wrap' }}>{currentProgressData.task_command}</pre>
                        </div>
                        <button className="btn btn-success" style={{ marginTop:'10px', fontSize:'12px', padding:'8px 15px' }}
                          onClick={()=>{ navigator.clipboard.writeText(currentProgressData.task_command); setSuccess('📋 命令已复制到剪贴板'); }}>
                          <i className="fas fa-copy"></i> 复制命令
                        </button>
                      </div>
                    )}
                  </>
                ) : (
                  <>
                    <div style={{ display:'flex', gap:'10px', marginBottom:'20px' }}>
                      <button className="btn btn-info btn-sm" onClick={()=>downloadFile(currentProgressTaskId, 'log')} disabled={!currentProgressTaskId}>
                        <i className="fas fa-download"></i> 下载日志文件
                      </button>
                    </div>
                    {currentProgressData && (
                      <>
                        <p><strong>日志文件:</strong> {currentProgressData.log_file}</p>
                        <p><strong>文件大小:</strong> {currentProgressData.file_size ? (currentProgressData.file_size/1024).toFixed(2) : '-'} KB</p>
                        <p><strong>最后修改:</strong> {currentProgressData.last_modified ? new Date(currentProgressData.last_modified).toLocaleString() : '未知'}</p>
                      </>
                    )}
                  </>
                )}
              </div>
              <div className="log-container">
                <div className="log-header">
                  <h4><i className={`fas ${modalMode === 'progress' ? 'fa-terminal' : 'fa-file-alt'}`}></i> {modalMode === 'progress' ? '实时日志' : '日志内容'}</h4>
                  <div className="log-controls">
                    {modalMode === 'progress' && <button className="btn btn-secondary" onClick={()=>setLogs([])}><i className="fas fa-trash"></i> 清空日志</button>}
                  </div>
                </div>
                <div className="log-content" id="logContent">
                  {(modalMode === 'logs' ? historicalLogs : logs).length === 0 ? (
                    <div className="log-empty"><i className="fas fa-hourglass-half"></i><p>{modalMode === 'logs' ? '暂无历史日志数据' : '等待日志输出...'}</p></div>
                  ) : (
                    (modalMode === 'logs' ? historicalLogs : logs).map((log, index) => (
                      <div key={index} className="log-line">
                        <span className="log-timestamp">{new Date(log.timestamp).toLocaleTimeString()}</span>
                        <span className="log-text">{log.message}</span>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
            <div className="modal-footer"><button className="btn btn-secondary" onClick={closeProgressModal}><i className="fas fa-times"></i> 关闭</button></div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.render(<ErrorBoundary><AgentSecurityDetector /></ErrorBoundary>, document.getElementById('root'));
</script>
</body>
</html>
